name: Build Mod
 
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
 
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
 
      - name: Build with Gradle
        run: ./gradlew build
 
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ZakoHealthIndicator-1.21.4
          path: build/libs/*-1.1.jar
